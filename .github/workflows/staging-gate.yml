name: Gate main → staging

# Quality gate. Every push to main deploys immediately to the main preview
# (main.mainifold.pages.dev) via Cloudflare's native git integration — that
# preview is intentionally pre-test. This workflow is what gives `staging` its
# meaning: it builds, unit-tests, and e2e-tests the pushed commit, and only if
# everything passes does it fast-forward `staging` to match. A red build or
# test leaves staging parked on the last known-good commit.
#
# The e2e suite is CPU-bound (each test boots WASM in its own browser page), so
# it runs SERIALLY within a runner (playwright.config.ts pins workers: 1) and
# is parallelized across runners by sharding instead — contention-free, and the
# wall-clock cost still drops ~3x.

on:
  push:
    branches: [main]

# Serialize promotions so two rapid pushes to main can't race the staging push.
concurrency:
  group: staging-gate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-unit:
    runs-on: ubuntu-latest
    outputs:
      promote-sha: ${{ steps.commit-catalog.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh models catalog snapshot
        id: commit-catalog
        run: |
          node scripts/refreshModelsSnapshot.mjs
          if ! git diff --quiet src/ai/generated/modelsCatalog.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/ai/generated/modelsCatalog.json
            git commit -m "chore: refresh models catalog snapshot"
            git push origin HEAD:main
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi
      - name: Build (type-check + vite build)
        run: npm run build
      - name: Unit tests
        run: npm run test:unit

  e2e:
    needs: build-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Cache the ~150MB Chromium build keyed on the lockfile (which pins the
      # playwright version). Cache hits skip the download; system deps still
      # install fresh below.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium
      - name: E2E tests (shard ${{ matrix.shard }}/3)
        run: npx playwright test --shard=${{ matrix.shard }}/3

  promote:
    needs: [build-unit, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Reached only when build + unit + every e2e shard pass. Promotes the
      # green commit to staging, which Cloudflare deploys to the known-good
      # staging preview. Uses the SHA from build-unit, which may be one commit
      # ahead of GITHUB_SHA if the catalog snapshot was refreshed.
      - name: Promote to staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin staging main
          git checkout -B staging origin/staging
          PROMOTE_SHA="${{ needs.build-unit.outputs.promote-sha }}"
          git merge --ff-only "$PROMOTE_SHA" || git merge --no-edit "$PROMOTE_SHA"
          git push origin staging
