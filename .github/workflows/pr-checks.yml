name: PR checks

# Pre-merge feedback on PRs into main: type-check, production build, unit
# tests, and the full e2e suite. Build + unit gates the e2e matrix so we
# don't burn shard minutes on a broken build.
#
# Every PR push runs the full suite — build + unit, then the e2e shards —
# regardless of draft state, so draft PRs get the same signal as ready ones.
# Drafts already fire `opened`/`synchronize` like any PR, and there's no
# draft gate on the e2e job. Marking a PR ready for review is purely a
# review-readiness signal — it does not re-run CI (the draft pushes did).
#
# The e2e suite is CPU-bound (each test boots WASM in its own browser page),
# so it runs SERIALLY within a runner (playwright.config.ts pins workers: 1)
# and is parallelized across runners by sharding — contention-free, and
# wall-clock cost drops ~3x.
#
# Doc-only changes (markdown, release config, license) skip CI entirely via
# paths-ignore — they can't affect build/test/runtime behavior.
#
# The staging-gate workflow re-runs the full suite after merge as the
# staging promotion gate (and as a safety net for any direct pushes).

on:
  pull_request:
    branches: [main]
    # Drafts trigger opened/synchronize like any PR, so they get the full
    # suite too. No ready_for_review: flipping a green draft to ready would
    # only re-run the same commit's checks and waste shard minutes.
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - '.github/release.yml'
      - 'LICENSE'

# A new push to the PR branch supersedes an in-flight run for the same PR.
concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (type-check + vite build)
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

  e2e:
    needs: build-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Cache the ~150MB Chromium build keyed on the lockfile (which pins the
      # playwright version). Cache hits skip the download; system deps still
      # install fresh below.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium
      - name: E2E tests (shard ${{ matrix.shard }}/3)
        run: npx playwright test --shard=${{ matrix.shard }}/3
