<svg class="hero-mark" width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — isometric stepped part building up layer by layer">
      <defs>
        <linearGradient id="h-top" x1="20" y1="20" x2="44" y2="50" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#2dd4bf"/>
        </linearGradient>
        <linearGradient id="h-right" x1="32" y1="26" x2="50" y2="56" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#14b8a6"/><stop offset="1" stop-color="#0d9488"/>
        </linearGradient>
        <linearGradient id="h-left" x1="14" y1="26" x2="32" y2="56" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#0b6b62"/>
        </linearGradient>
        <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="h-plate" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1f2937"/><stop offset="1" stop-color="#0f172a"/>
        </linearGradient>
      </defs>

      <!-- contact shadow grounding the build plate -->
      <ellipse cx="32" cy="57.2" rx="22" ry="3" fill="url(#h-shadow)"/>

      <!-- build plate: a thin dark navy iso slab the part grows from -->
      <g class="plate">
        <path d="M46.8 45.9 L32 53.3 L17.2 45.9 L32 38.5 Z" fill="#111827"/>
        <path d="M17.2 45.9 L32 53.3 L32 55.2 L17.2 47.8 Z" fill="url(#h-plate)"/>
        <path d="M46.8 45.9 L32 53.3 L32 55.2 L46.8 47.8 Z" fill="#0b1220"/>
        <!-- faint teal datum lines on the plate -->
        <path d="M46.8 45.9 L32 53.3 L17.2 45.9" fill="none" stroke="#14b8a6" stroke-width="0.6" stroke-opacity="0.4" stroke-linejoin="round"/>
      </g>

      <!-- ===== the part: layers stack bottom-up ===== -->
      <!-- base tier layers 0..4 -->
      <g class="ly ly0">
        <path d="M17.2 43.45 L32 50.85 L32 53.3 L17.2 45.9 Z" fill="url(#h-left)"/>
        <path d="M46.8 43.45 L32 50.85 L32 53.3 L46.8 45.9 Z" fill="url(#h-right)"/>
        <path class="seam" d="M17.2 43.45 L32 50.85 L46.8 43.45" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
        <path class="flash" d="M32 41 L46.8 48.4 L32 55.8 L17.2 48.4 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
      </g>
      <g class="ly ly1">
        <path d="M17.2 41 L32 48.4 L32 50.85 L17.2 43.45 Z" fill="url(#h-left)"/>
        <path d="M46.8 41 L32 48.4 L32 50.85 L46.8 43.45 Z" fill="url(#h-right)"/>
        <path class="seam" d="M17.2 41 L32 48.4 L46.8 41" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
        <path class="flash" d="M32 38.55 L46.8 45.95 L32 53.35 L17.2 45.95 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
      </g>
      <g class="ly ly2">
        <path d="M17.2 38.55 L32 45.95 L32 48.4 L17.2 41 Z" fill="url(#h-left)"/>
        <path d="M46.8 38.55 L32 45.95 L32 48.4 L46.8 41 Z" fill="url(#h-right)"/>
        <path class="seam" d="M17.2 38.55 L32 45.95 L46.8 38.55" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
        <path class="flash" d="M32 36.1 L46.8 43.5 L32 50.9 L17.2 43.5 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
      </g>
      <g class="ly ly3">
        <path d="M17.2 36.1 L32 43.5 L32 45.95 L17.2 38.55 Z" fill="url(#h-left)"/>
        <path d="M46.8 36.1 L32 43.5 L32 45.95 L46.8 38.55 Z" fill="url(#h-right)"/>
        <path class="seam" d="M17.2 36.1 L32 43.5 L46.8 36.1" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
        <path class="flash" d="M32 33.65 L46.8 41.05 L32 48.45 L17.2 41.05 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
      </g>
      <g class="ly ly4">
        <path d="M17.2 33.65 L32 41.05 L32 43.5 L17.2 36.1 Z" fill="url(#h-left)"/>
        <path d="M46.8 33.65 L32 41.05 L32 43.5 L46.8 36.1 Z" fill="url(#h-right)"/>
        <!-- base shoulder: full top diamond at z=5 (exposed ring around the crown) -->
        <path d="M32 26.25 L46.8 33.65 L32 41.05 L17.2 33.65 Z" fill="url(#h-top)"/>
        <path class="flash" d="M32 26.25 L46.8 33.65 L32 41.05 L17.2 33.65 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
      </g>

      <!-- top tier layers 5..7 (raised crown, inset footprint) -->
      <g class="ly ly5">
        <path d="M24.23 31.2 L32 35.08 L32 37.53 L24.23 33.65 Z" fill="url(#h-left)"/>
        <path d="M39.77 31.2 L32 35.08 L32 37.53 L39.77 33.65 Z" fill="url(#h-right)"/>
        <path class="seam" d="M24.23 31.2 L32 35.08 L39.77 31.2" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
        <path class="flash" d="M32 27.31 L39.77 31.2 L32 35.08 L24.23 31.2 Z" fill="none" stroke="#ccfbf1" stroke-width="1" stroke-opacity="0"/>
      </g>
      <g class="ly ly6">
        <path d="M24.23 28.75 L32 32.63 L32 35.08 L24.23 31.2 Z" fill="url(#h-left)"/>
        <path d="M39.77 28.75 L32 32.63 L32 35.08 L39.77 31.2 Z" fill="url(#h-right)"/>
        <path class="seam" d="M24.23 28.75 L32 32.63 L39.77 28.75" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
        <path class="flash" d="M32 24.86 L39.77 28.75 L32 32.63 L24.23 28.75 Z" fill="none" stroke="#ccfbf1" stroke-width="1" stroke-opacity="0"/>
      </g>
      <g class="ly ly7">
        <path d="M24.23 26.3 L32 30.18 L32 32.63 L24.23 28.75 Z" fill="url(#h-left)"/>
        <path d="M39.77 26.3 L32 30.18 L32 32.63 L39.77 28.75 Z" fill="url(#h-right)"/>
        <!-- crown: top diamond at z=8 -->
        <path d="M32 22.41 L39.77 26.3 L32 30.18 L24.23 26.3 Z" fill="url(#h-top)"/>
        <!-- crisp lit front edges of the crown -->
        <path d="M24.23 26.3 L32 30.18 L39.77 26.3" fill="none" stroke="#ccfbf1" stroke-width="0.7" stroke-opacity="0.85" stroke-linejoin="round"/>
        <!-- a single warm amber maker's spark on the crown's top-right edge -->
        <path d="M33.6 23.2 L38.9 25.85" fill="none" stroke="#fbbf24" stroke-width="1.1" stroke-linecap="round" opacity="0.95"/>
        <path class="flash" d="M32 22.41 L39.77 26.3 L32 30.18 L24.23 26.3 Z" fill="none" stroke="#ccfbf1" stroke-width="1" stroke-opacity="0"/>
      </g>
    </svg>