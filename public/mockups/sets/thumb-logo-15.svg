<svg class="imp-hero" width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright — an impossible isometric tri-bar with one amber beam">
      <defs>
        <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="h-tealtop" x1="9" y1="6" x2="55" y2="36" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#99f6e4"/><stop offset="1" stop-color="#5eead4"/>
        </linearGradient>
        <linearGradient id="h-tealmid" x1="9" y1="23" x2="55" y2="58" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#14b8a6"/>
        </linearGradient>
        <linearGradient id="h-ambertop" x1="9" y1="23" x2="55" y2="50" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/>
        </linearGradient>
      </defs>

      <!-- contact shadow grounds the solid -->
      <ellipse cx="32" cy="61" rx="22" ry="2.4" fill="url(#h-shadow)"/>

      <!-- ============================================================
           IMPOSSIBLE TRI-BAR — three equal iso beams chained L3→L2→L1.
           Each beam is a real cuboid (top + two side faces + end cap),
           projected on a true isometric grid so every face is clean.
           Draw order (vertical beam first, top beam last) makes each
           beam occlude the previous one's joint — the Penrose "aha".
           L1 = top beam (lit teal) · L3 = left/stem beam (mid teal)
           L2 = lower beam = AMBER accent (the one that can't connect).
           Coordinates baked to the 0–64 space — no nested transform.
           ============================================================ -->

      <!-- L3 — left vertical beam (drawn first = furthest back) -->
      <polygon points="16.99,49.33 9.48,53.67 9.48,10.33 16.99,6.00" fill="#0e7c70"/>
      <polygon points="16.99,49.33 24.49,53.67 24.49,10.33 16.99,6.00" fill="url(#h-tealmid)"/>
      <polygon points="16.99,6.00 24.49,10.33 16.99,14.67 9.48,10.33" fill="#5eead4"/>

      <!-- L2 — lower beam, AMBER (the impossible connector) -->
      <polygon points="47.01,32.00 54.52,36.33 54.52,27.67 47.01,23.33" fill="#a85b04"/>
      <polygon points="47.01,32.00 9.48,53.67 9.48,45.00 47.01,23.33" fill="#c9760a"/>
      <polygon points="9.48,53.67 16.99,58.00 16.99,49.33 9.48,45.00" fill="#a85b04"/>
      <polygon points="47.01,23.33 54.52,27.67 16.99,49.33 9.48,45.00" fill="url(#h-ambertop)"/>

      <!-- L1 — top beam, lit teal (drawn last = nearest, completes the impossibility) -->
      <polygon points="16.99,14.67 54.52,36.33 54.52,27.67 16.99,6.00" fill="#0d9488"/>
      <polygon points="54.52,36.33 47.01,40.67 47.01,32.00 54.52,27.67" fill="#0a6960"/>
      <polygon points="16.99,14.67 9.48,19.00 9.48,10.33 16.99,6.00" fill="#14b8a6"/>
      <polygon points="16.99,6.00 54.52,27.67 47.01,32.00 9.48,10.33" fill="url(#h-tealtop)"/>

      <!-- crisp dark edge lines around each beam sell the engineered solid -->
      <g fill="none" stroke="#052a26" stroke-width="0.7" stroke-linejoin="round" stroke-linecap="round" opacity="0.5">
        <polygon points="16.99,6.00 24.49,10.33 24.49,53.67 16.99,49.33 9.48,53.67 9.48,10.33"/>
        <polygon points="9.48,45.00 47.01,23.33 54.52,27.67 54.52,36.33 47.01,40.67 16.99,58.00 9.48,53.67"/>
        <polygon points="9.48,10.33 16.99,6.00 54.52,27.67 54.52,36.33 47.01,40.67 9.48,19.00"/>
      </g>
      <!-- lit highlight along the two top crests -->
      <g fill="none" stroke="#ccfbf1" stroke-width="0.7" stroke-linecap="round" opacity="0.7">
        <path d="M9.48,10.33 L16.99,6.00 L54.52,27.67"/>
      </g>
    </svg>