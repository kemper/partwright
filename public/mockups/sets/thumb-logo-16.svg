<svg class="render-hero" width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright — a studio render of a filleted counterbored boss in teal-to-indigo">
      <defs>
        <!-- TOP face: lit teal crest sliding to a cooler far edge -->
        <linearGradient id="h-top" x1="14" y1="14" x2="50" y2="30" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#7df0dd"/><stop offset="0.5" stop-color="#2dd4bf"/><stop offset="1" stop-color="#1aa6cf"/>
        </linearGradient>
        <!-- SIDE wall: the duotone hand-off — teal at the lit left, indigo into shade -->
        <linearGradient id="h-side" x1="12" y1="30" x2="52" y2="52" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#14b8a6"/><stop offset="0.42" stop-color="#2c8fd1"/><stop offset="0.78" stop-color="#5a63ec"/><stop offset="1" stop-color="#4046c4"/>
        </linearGradient>
        <!-- vertical shading of the wall — top lip bright, base falls into core shadow -->
        <linearGradient id="h-sideV" x1="0" y1="26" x2="0" y2="54" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="0.34" stop-color="#ffffff" stop-opacity="0"/>
          <stop offset="0.72" stop-color="#0b1020" stop-opacity="0"/><stop offset="1" stop-color="#0b1020" stop-opacity="0.62"/>
        </linearGradient>
        <!-- fillet band catching the key light along the top edge -->
        <linearGradient id="h-fillet" x1="13" y1="22" x2="51" y2="32" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#eafffb" stop-opacity="0.95"/><stop offset="0.5" stop-color="#bff4ea" stop-opacity="0.6"/><stop offset="1" stop-color="#7ad6e8" stop-opacity="0.2"/>
        </linearGradient>
        <!-- counterbore wall: dark teal-navy, the hole going down into the part -->
        <radialGradient id="h-bore" cx="0.42" cy="0.36" r="0.75">
          <stop offset="0" stop-color="#0a1a2e"/><stop offset="0.62" stop-color="#0d2a3f"/><stop offset="1" stop-color="#1c5e6b"/>
        </radialGradient>
        <!-- bore floor: small lit teal disc deep in the bore -->
        <radialGradient id="h-borefloor" cx="0.5" cy="0.5" r="0.6">
          <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#0e7e84"/>
        </radialGradient>
        <!-- specular hot-spot on the filleted lip -->
        <radialGradient id="h-spec" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="0.6" stop-color="#ffffff" stop-opacity="0.25"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
        <!-- soft AO contact shadow on the floor -->
        <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.55"/><stop offset="0.6" stop-color="#000" stop-opacity="0.28"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <!-- AO darkening tucked under the top overhang -->
        <linearGradient id="h-ao" x1="0" y1="29" x2="0" y2="38" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#04111c" stop-opacity="0.55"/><stop offset="1" stop-color="#04111c" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- contact shadow grounding the part -->
      <ellipse cx="33" cy="55.5" rx="22" ry="5" fill="url(#h-shadow)"/>

      <!-- ===== SIDE WALL of the cylinder =====
           Outer ellipse top (cy 28) swept down by the part height to the
           bottom rim (cy 44); only the front arc of the bottom is visible. -->
      <path fill="url(#h-side)" d="
        M 9 28
        A 23 9 0 0 0 55 28
        L 55 44
        A 23 9 0 0 1 9 44
        Z"/>
      <!-- vertical light/shade modelling on the wall -->
      <path fill="url(#h-sideV)" d="
        M 9 28
        A 23 9 0 0 0 55 28
        L 55 44
        A 23 9 0 0 1 9 44
        Z"/>
      <!-- AO band tucked just under the top edge overhang -->
      <path fill="url(#h-ao)" d="M 9 28 A 23 9 0 0 0 55 28 L 55 33 A 23 9 0 0 1 9 33 Z"/>

      <!-- ===== TOP FACE (the filleted disc) ===== -->
      <ellipse cx="32" cy="28" rx="23" ry="9" fill="url(#h-top)"/>
      <!-- filleted top rim: a bright rounded-over edge catching the key light -->
      <ellipse cx="32" cy="28" rx="23" ry="9" fill="none" stroke="url(#h-fillet)" stroke-width="2.4"/>
      <!-- inner soft step where the fillet rolls onto the flat top -->
      <ellipse cx="32" cy="27.3" rx="20" ry="7.5" fill="none" stroke="#bdf6ec" stroke-width="0.8" stroke-opacity="0.45"/>

      <!-- ===== COUNTERBORE (the hole) ===== -->
      <!-- bore mouth wall, slightly offset down to read as depth -->
      <ellipse cx="32" cy="28" rx="9.5" ry="3.7" fill="url(#h-bore)"/>
      <!-- chamfer/fillet glint on the lit edge of the bore mouth -->
      <path d="M 22.7 27 A 9.5 3.7 0 0 1 41.3 27" fill="none" stroke="#7df0dd" stroke-width="0.9" stroke-opacity="0.7"/>
      <!-- bore floor disc deeper down -->
      <ellipse cx="32" cy="29.6" rx="6.2" ry="2.4" fill="url(#h-borefloor)"/>
      <!-- shadow crescent in the far side of the bore -->
      <path d="M 22.5 28.4 A 9.5 3.7 0 0 0 41.5 28.4 A 9.5 3.7 0 0 0 22.5 28.4 Z" fill="#04121e" fill-opacity="0.40"/>

      <!-- crisp specular hot-spot riding the front-left fillet -->
      <ellipse class="render-spec" cx="18" cy="25.4" rx="5.5" ry="2.4" fill="url(#h-spec)" transform="rotate(-22 18 25.4)"/>
      <!-- tiny secondary sparkle on the bore lip -->
      <circle cx="27.5" cy="26.2" r="1.1" fill="#ffffff" fill-opacity="0.85"/>
    </svg>