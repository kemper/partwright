      </defs>
      <!-- lower slab -->
      <path d="M32 37 L50 28 L50 40 L32 49 Z" fill="url(#h-right)"/>
      <path d="M14 28 L32 37 L32 49 L14 40 Z" fill="url(#h-left)"/>
