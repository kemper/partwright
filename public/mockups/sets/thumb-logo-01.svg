<svg width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright">
      <defs>
        <linearGradient id="h-top" x1="14" y1="13" x2="48" y2="35" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#2dd4bf"/>
        </linearGradient>
        <linearGradient id="h-left" x1="14" y1="28" x2="32" y2="49" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#15b3a4"/><stop offset="1" stop-color="#0c8579"/>
        </linearGradient>
        <linearGradient id="h-right" x1="32" y1="37" x2="50" y2="49" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#0a6f66"/>
