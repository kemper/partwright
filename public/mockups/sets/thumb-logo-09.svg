<svg width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright — animated negative-space P tile">
      <defs>
        <linearGradient id="h-teal" x1="8" y1="6" x2="56" y2="60" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/><stop offset="0.5" stop-color="#2dd4bf"/><stop offset="1" stop-color="#14b8a6"/>
        </linearGradient>
        <!-- soft diagonal sheen band -->
        <linearGradient id="h-sheen" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#fff" stop-opacity="0"/>
          <stop offset="0.42" stop-color="#fff" stop-opacity="0"/>
          <stop offset="0.5" stop-color="#fff" stop-opacity="0.5"/>
          <stop offset="0.58" stop-color="#fff" stop-opacity="0"/>
          <stop offset="1" stop-color="#fff" stop-opacity="0"/>
        </linearGradient>
        <!-- pocket-wall vertical shade: a hint of bored depth on the cut P -->
        <linearGradient id="h-wall" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#0f766e" stop-opacity="0.55"/>
          <stop offset="1" stop-color="#042f2e" stop-opacity="0.7"/>
        </linearGradient>
        <mask id="h-cut">
          <!-- white = keep teal, black = cut to canvas -->
          <rect x="4" y="4" width="56" height="56" rx="15" fill="#fff"/>
          <!-- the P, cut out -->
          <path d="M21 15 H38 a11 11 0 0 1 0 22 H29 V49 H21 Z" fill="#000"/>
          <!-- counter island stays teal -->
          <path d="M29 22 H37.5 a4 4 0 0 1 0 8 H29 Z" fill="#fff"/>
        </mask>
        <!-- mask that keeps ONLY the cut-P region, so we can paint the pocket floor + walls there -->
        <mask id="h-pocket">
          <rect x="4" y="4" width="56" height="56" rx="15" fill="#000"/>
          <path d="M21 15 H38 a11 11 0 0 1 0 22 H29 V49 H21 Z" fill="#fff"/>
          <path d="M29 22 H37.5 a4 4 0 0 1 0 8 H29 Z" fill="#000"/>
        </mask>
        <clipPath id="h-tileclip"><rect x="4" y="4" width="56" height="56" rx="15"/></clipPath>
      </defs>

      <!-- whole mark tilts together → the cut reads as a beveled pocket with depth -->
      <g class="tilt-h">
        <!-- pocket floor (bare canvas) painted a touch darker so the cut feels recessed -->
        <g clip-path="url(#h-tileclip)">
          <rect x="4" y="4" width="56" height="56" rx="15" fill="#0a0a0b" mask="url(#h-pocket)"/>
          <!-- soft wall gradient inside the pocket for the beveled look -->
          <rect x="4" y="4" width="56" height="56" rx="15" fill="url(#h-wall)" mask="url(#h-pocket)"/>
        </g>

        <!-- the teal tile with the P knocked out -->
        <rect x="4" y="4" width="56" height="56" rx="15" fill="url(#h-teal)" mask="url(#h-cut)"/>

        <!-- crisp lit edge on the pocket's top/left walls — settles + breathes -->
        <path class="edge-h" d="M21 15 H38 M21 15 V49 H29" fill="none" stroke="#bbf7e6" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round" stroke-opacity="0.72"/>
        <path class="edge-h" d="M29 22 H37.5 M29 22 V30" fill="none" stroke="#bbf7e6" stroke-width="0.8" stroke-linejoin="round" stroke-linecap="round" stroke-opacity="0.55"/>

        <!-- diagonal sheen, clipped to the tile and removed over the cut so it never washes the silhouette -->
        <g clip-path="url(#h-tileclip)" mask="url(#h-cut)">
          <g class="sheen-h">
            <rect x="-70" y="-30" width="60" height="130" fill="url(#h-sheen)" transform="rotate(20 32 32)"/>
          </g>
        </g>
      </g>
    </svg>