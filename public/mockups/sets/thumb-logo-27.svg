<svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — oblique negative-space P">
  <defs>
    <!-- block face: raking left-to-right oblique light — bright teal LEFT, deep shadow RIGHT -->
    <linearGradient id="h-face" x1="9" y1="31" x2="55" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#5eead4"/>
      <stop offset="0.40" stop-color="#14b8a6"/>
      <stop offset="1"    stop-color="#0f3030"/>
    </linearGradient>
    <!-- glossy sheen: concentrated on the left third of the face -->
    <linearGradient id="h-gloss" x1="9" y1="20" x2="34" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#99f6e4" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>
    <!-- pocket floor: left-to-right oblique, lighter on left, darker on right -->
    <linearGradient id="h-floor" x1="22" y1="31" x2="48" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#0e4a45"/>
      <stop offset="1"   stop-color="#041a18"/>
    </linearGradient>
    <!-- raised boss: side-lit, bright left cheek -->
    <linearGradient id="h-boss" x1="30" y1="25.5" x2="40" y2="25.5" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#5eead4"/>
      <stop offset="1"   stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- identical P path to logo-10 -->
    <path id="h-P" fill-rule="evenodd" d="
      M24 16 L36.5 16
      C43 16 46.5 20 46.5 25.5
      C46.5 31 43 35 36.5 35
      L30 35 L30 48 L24 48 Z
      M30 22 L30 29 L35.5 29
      C38.4 29 39.8 27.6 39.8 25.5
      C39.8 23.4 38.4 22 35.5 22 Z"/>
    <clipPath id="h-clip"><rect x="9" y="8" width="46" height="46" rx="10"/></clipPath>
  </defs>

  <!-- contact shadow grounding the block -->
  <ellipse cx="32.5" cy="58.4" rx="22" ry="3.4" fill="url(#h-shadow)"/>

  <!-- the solid teal block, oblique gradient lit left→right -->
  <rect x="9" y="8" width="46" height="46" rx="10" fill="url(#h-face)"/>

  <!-- pocket: wall occlusion offset right (away from light), floor, bright left-wall lip -->
  <g>
    <!-- wall occlusion halo offset to the RIGHT (shadow falls right under oblique left light) -->
    <use href="#h-P" fill="#031512" transform="translate(1.2 0.5)"/>
    <!-- pocket floor — left-bright right-dark -->
    <use href="#h-P" fill="url(#h-floor)"/>
    <!-- bright machined lip on the LEFT walls: shift offset toward light source -->
    <use href="#h-P" fill="none" stroke="#5eead4" stroke-width="0.9" stroke-opacity="0.8" transform="translate(-0.55 0)"/>
  </g>

  <!-- raised boss: left face brighter, right face in shadow -->
  <g>
    <!-- boss drop shadow toward the right (away from oblique light) -->
    <path d="M30 22 L30 29 L35.5 29 C38.4 29 39.8 27.6 39.8 25.5 C39.8 23.4 38.4 22 35.5 22 Z" fill="#031512" transform="translate(0.9 0.4)"/>
    <path d="M30 22 L30 29 L35.5 29 C38.4 29 39.8 27.6 39.8 25.5 C39.8 23.4 38.4 22 35.5 22 Z" fill="url(#h-boss)"/>
    <!-- tiny specular on the boss left cap -->
    <ellipse cx="31.2" cy="25.5" rx="1.0" ry="1.5" fill="#ccfbf1" opacity="0.72"/>
  </g>

  <!-- gloss + edge highlights, clipped to rounded block -->
  <g clip-path="url(#h-clip)">
    <!-- glossy sheen overlay, concentrated on the left -->
    <rect x="9" y="8" width="46" height="46" rx="10" fill="url(#h-gloss)"/>
    <!-- crisp specular highlight on the LEFT vertical edge (the raking light catches it) -->
    <path d="M9.8 16 L9.8 48" stroke="#ccfbf1" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
    <!-- warm amber catch light at the upper-LEFT corner — maker's spark from the oblique source -->
    <path d="M9.9 8.9 C12.8 9.6 14.6 11.4 15.0 14.4" fill="none" stroke="#fbbf24" stroke-width="1.3" stroke-linecap="round" opacity="0.92"/>
  </g>
</svg>
