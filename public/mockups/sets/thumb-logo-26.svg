<svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — isometric hex standoff">
  <defs>
    <linearGradient id="h-top" x1="18" y1="24" x2="46" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="h-right" x1="32" y1="28" x2="50" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6"/><stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="h-left" x1="14" y1="28" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#0b6b62"/>
    </linearGradient>
    <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h-plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="h-bore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#051a17"/><stop offset="1" stop-color="#020d0b"/>
    </linearGradient>
  </defs>

  <!-- contact shadow -->
  <ellipse cx="32" cy="57.2" rx="19" ry="2.7" fill="url(#h-shadow)"/>

  <!-- build plate -->
  <path d="M46 49.8 L32 57.3 L18 49.8 L32 42.3 Z" fill="#111827"/>
  <path d="M18 49.8 L32 57.3 L32 59.2 L18 51.7 Z" fill="url(#h-plate)"/>
  <path d="M46 49.8 L32 57.3 L32 59.2 L46 51.7 Z" fill="#0b1220"/>
  <path d="M46 49.8 L32 57.3 L18 49.8" fill="none" stroke="#14b8a6" stroke-width="0.6" stroke-opacity="0.4" stroke-linejoin="round"/>

  <!-- full-height side walls (finished standoff — resting frame) -->
  <path d="M18 49.8 L32 56.8 L32 39.65 L18 32.65 Z" fill="url(#h-left)"/>
  <path d="M46 49.8 L32 56.8 L32 39.65 L46 32.65 Z" fill="url(#h-right)"/>

  <!-- layer seam striations -->
  <g stroke="#0b3b38" stroke-width="0.45" stroke-opacity="0.38" fill="none">
    <path d="M18 47.35 L32 54.35 L46 47.35"/>
    <path d="M18 44.9 L32 51.9 L46 44.9"/>
    <path d="M18 42.45 L32 49.45 L46 42.45"/>
    <path d="M18 40.0 L32 47.0 L46 40.0"/>
    <path d="M18 37.55 L32 44.55 L46 37.55"/>
    <path d="M18 35.1 L32 42.1 L46 35.1"/>
  </g>

  <!-- knurl cross-hatch on left face -->
  <g stroke="#ccfbf1" stroke-width="0.55" stroke-opacity="0.30" stroke-linecap="round" fill="none">
    <line x1="18" y1="49.0" x2="25" y2="56.3"/>
    <line x1="18" y1="44.5" x2="27" y2="53.0"/>
    <line x1="18" y1="40.0" x2="29" y2="49.5"/>
    <line x1="21" y1="35.5" x2="32" y2="45.5"/>
    <line x1="26" y1="33.0" x2="32" y2="39.5"/>
  </g>
  <!-- knurl cross-hatch on right face -->
  <g stroke="#ccfbf1" stroke-width="0.55" stroke-opacity="0.20" stroke-linecap="round" fill="none">
    <line x1="46" y1="49.0" x2="39" y2="56.3"/>
    <line x1="46" y1="44.5" x2="37" y2="53.0"/>
    <line x1="46" y1="40.0" x2="35" y2="49.5"/>
    <line x1="43" y1="35.5" x2="32" y2="45.5"/>
    <line x1="38" y1="33.0" x2="32" y2="39.5"/>
  </g>

  <!-- top hex face -->
  <path d="M32 39.65 L18 32.65 L18 25.65 L32 18.65 L46 25.65 L46 32.65 Z" fill="url(#h-top)"/>
  <!-- subtle internal lines on top face -->
  <path d="M32 39.65 L32 18.65" fill="none" stroke="#0b3b38" stroke-width="0.4" stroke-opacity="0.22"/>
  <path d="M18 32.65 L46 32.65" fill="none" stroke="#0b3b38" stroke-width="0.4" stroke-opacity="0.22"/>
  <path d="M18 25.65 L46 25.65" fill="none" stroke="#0b3b38" stroke-width="0.4" stroke-opacity="0.16"/>
  <!-- lit front edge -->
  <path d="M18 32.65 L32 39.65 L46 32.65" fill="none" stroke="#ccfbf1" stroke-width="0.75" stroke-opacity="0.9" stroke-linejoin="round"/>

  <!-- threaded bore (dark hex indent) -->
  <path d="M32 31.8 L28.2 29.5 L28.2 27.2 L32 24.9 L35.8 27.2 L35.8 29.5 Z" fill="url(#h-bore)" stroke="#051a17" stroke-width="0.6" stroke-opacity="0.9"/>
  <path d="M32 31.8 L28.2 29.5 L28.2 27.2 L32 24.9" fill="none" stroke="#ccfbf1" stroke-width="0.3" stroke-opacity="0.12"/>

  <!-- amber spark on top-front right edge -->
  <path d="M33.8 37.2 L43.5 32.2" fill="none" stroke="#fbbf24" stroke-width="1.1" stroke-linecap="round" opacity="0.95"/>
</svg>
