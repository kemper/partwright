<svg class="vor-hero" width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright — a bold letter P skinned in a parametric Voronoi lattice">
      <defs>
        <!-- letter-P field: deep navy so teal struts pop -->
        <linearGradient id="vh-bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0f1e30"/><stop offset="1" stop-color="#091420"/>
        </linearGradient>
        <!-- strut gradient: lit teal crest down to emerald -->
        <linearGradient id="vh-strut" x1="10" y1="8" x2="50" y2="58" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/><stop offset="0.55" stop-color="#2dd4bf"/><stop offset="1" stop-color="#14b8a6"/>
        </linearGradient>
        <!-- translucent cell flood -->
        <linearGradient id="vh-cell" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#0d9488"/>
        </linearGradient>
        <!-- amber accent node spark -->
        <radialGradient id="vh-node" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#fbbf24"/>
        </radialGradient>
        <radialGradient id="vh-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <!-- the P silhouette, used both as fill and as the lattice clip -->
        <path id="vh-P" d="M16 8 H38 a14 14 0 0 1 0 28 H26 V56 H16 Z M26 17 V27 H37 a5 5 0 0 0 0 -10 Z"/>
        <clipPath id="vh-clip" clip-rule="evenodd"><use href="#vh-P" clip-rule="evenodd"/></clipPath>
      </defs>

      <!-- contact shadow grounding the mark -->
      <ellipse cx="30" cy="60" rx="20" ry="2.4" fill="url(#vh-shadow)"/>

      <!-- solid P body (gives the lattice a shell to live in) -->
      <use href="#vh-P" fill="url(#vh-bg)" fill-rule="evenodd"/>

      <g clip-path="url(#vh-clip)" class="vor-shimmer">
        <!-- ===== VORONOI LATTICE filling the P =====
             Cells are irregular convex polygons sharing edges. A few are
             flooded with translucent teal for depth; packing tightens toward
             the letter edges. Struts are drawn ON TOP so every shared wall
             reads as one continuous teal web. -->

        <!-- flooded cells (translucent, behind the struts) -->
        <g fill="url(#vh-cell)" opacity="0.30">
          <polygon points="20,21 28,20 27,30 19,31"/>
          <polygon points="32,40 41,41 40,50 31,49"/>
          <polygon points="33,11 41,13 39,21 32,20"/>
        </g>
        <g fill="url(#vh-cell)" opacity="0.18">
          <polygon points="19,40 27,39 28,49 20,51"/>
          <polygon points="41,22 47,25 45,32 39,30"/>
        </g>

        <!-- the cell-wall web (all shared edges of the Voronoi diagram) -->
        <g fill="none" stroke="url(#vh-strut)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
          <!-- stem column cells -->
          <polygon points="20,21 28,20 27,30 19,31"/>
          <polygon points="19,31 27,30 27,39 19,40"/>
          <polygon points="19,40 27,39 28,49 20,51"/>
          <polygon points="20,51 28,49 27,55 20,55"/>
          <polygon points="16,12 20,21 19,31 16,30"/>
          <polygon points="16,30 19,31 19,40 16,40"/>
          <polygon points="16,40 19,40 20,51 16,50"/>
          <polygon points="16,12 28,11 28,20 20,21"/>
          <!-- bowl: ring of cells around the counter -->
          <polygon points="28,11 33,11 32,20 28,20"/>
          <polygon points="33,11 41,13 39,21 32,20"/>
          <polygon points="41,13 47,17 47,25 41,22"/>
          <polygon points="47,17 50,24 47,25"/>
          <polygon points="47,25 45,32 41,30 41,22"/>
          <polygon points="45,32 40,35 36,32 41,30"/>
          <polygon points="36,32 40,35 33,36 32,32"/>
          <polygon points="28,28 32,32 33,36 28,36"/>
          <polygon points="28,20 32,20 32,32 28,28"/>
          <polygon points="41,22 41,30 36,32 32,32 32,20 39,21"/>
          <!-- lower stem extension cells -->
          <polygon points="27,39 32,40 31,49 28,49"/>
          <polygon points="32,40 41,41 40,50 31,49"/>
          <polygon points="28,49 31,49 30,55 28,55"/>
        </g>

        <!-- bright node dots at a few lattice vertices (the seed points) -->
        <g fill="#99f6e4">
          <circle cx="27" cy="30" r="1.05"/>
          <circle cx="32" cy="20" r="1.05"/>
          <circle cx="41" cy="22" r="1.05"/>
          <circle cx="20" cy="40.5" r="1.05"/>
          <circle cx="36" cy="32" r="1.05"/>
        </g>
        <circle cx="41" cy="30" r="1.3" fill="url(#vh-node)"/>
      </g>

      <!-- crisp lit rim on the P outline so the shell edge catches light -->
      <use href="#vh-P" fill="none" fill-rule="evenodd" stroke="#5eead4" stroke-width="1.1" stroke-opacity="0.85"/>
    </svg>