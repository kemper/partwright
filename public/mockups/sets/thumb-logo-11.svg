<svg class="mark-dt" width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright — negative-space P bored as an isometric pocket with a raised teal counter boss">
      <defs>
        <linearGradient id="h-teal" x1="8" y1="6" x2="56" y2="60" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/><stop offset="0.5" stop-color="#2dd4bf"/><stop offset="1" stop-color="#14b8a6"/>
        </linearGradient>
        <!-- pocket side-wall: darker teal, raked so depth reads -->
        <linearGradient id="h-wall" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#115e59"/><stop offset="1" stop-color="#042f2e"/>
        </linearGradient>
        <!-- pocket floor: darkest, the bottom of the bore -->
        <linearGradient id="h-floor" x1="20" y1="14" x2="42" y2="52" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0b3b38"/><stop offset="1" stop-color="#04201d"/>
        </linearGradient>
        <!-- the floating counter chip: a lit little teal part -->
        <linearGradient id="h-chip" x1="0" y1="0" x2="0.6" y2="1">
          <stop offset="0" stop-color="#ccfbf1"/><stop offset="1" stop-color="#2dd4bf"/>
        </linearGradient>
        <!-- P MOUTH = the bored pocket opening (solid P silhouette: stem + full bowl) -->
        <path id="h-Pmouth" d="M22 14 H38 a11.5 11.5 0 0 1 0 23 H30 V50 H22 Z"/>
        <!-- counter shape — the teal centre of the bowl; here it's the raised BOSS that forms the P's counter -->
        <path id="h-counter" d="M30 21 H37.6 a4.4 4.4 0 0 1 0 9 H30 Z"/>
        <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.55"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <clipPath id="h-tileclip"><rect x="4" y="4" width="56" height="56" rx="15"/></clipPath>
      </defs>

      <!-- soft contact shadow grounding the tile -->
      <ellipse cx="32" cy="60.5" rx="22" ry="2.6" fill="url(#h-shadow)"/>

      <g clip-path="url(#h-tileclip)">
        <!-- 1. pocket WALLS: copies of the P mouth fanned along the iso-depth vector (down-right).
                stacking faint offsets builds a continuous extruded wall surface -->
        <g class="walls" fill="url(#h-wall)">
          <use href="#h-Pmouth" transform="translate(4.2 4.6)"/>
          <use href="#h-Pmouth" transform="translate(3.6 3.95)"/>
          <use href="#h-Pmouth" transform="translate(3.0 3.3)"/>
          <use href="#h-Pmouth" transform="translate(2.4 2.65)"/>
          <use href="#h-Pmouth" transform="translate(1.8 2.0)"/>
          <use href="#h-Pmouth" transform="translate(1.2 1.35)"/>
          <use href="#h-Pmouth" transform="translate(0.6 0.7)"/>
        </g>
        <!-- 2. pocket FLOOR sits at the far end of the wall fan -->
        <use href="#h-Pmouth" transform="translate(4.6 5.05)" fill="url(#h-floor)"/>
        <!-- ambient occlusion where the floor meets the lit front face -->
        <use href="#h-Pmouth" transform="translate(4.6 5.05)" fill="none" stroke="#03110f" stroke-width="1.0" stroke-opacity="0.55"/>

        <!-- 3. the teal TILE FACE with the P punched clean through (front-most surface) -->
        <path fill="url(#h-teal)" fill-rule="evenodd"
              d="M4 19 a15 15 0 0 1 15 -15 H45 a15 15 0 0 1 15 15 V45 a15 15 0 0 1 -15 15 H19 a15 15 0 0 1 -15 -15 Z
                 M22 14 H38 a11.5 11.5 0 0 1 0 23 H30 V50 H22 Z"/>
        <!-- crisp machined lip catching light on the front face's top-left cut edges -->
        <use href="#h-Pmouth" fill="none" stroke="#ccfbf1" stroke-width="0.7" stroke-opacity="0.8"/>
      </g>

      <!-- 4. the COUNTER BOSS — the bowl's counter survives as a small teal part standing PROUD inside
              the pocket: a short iso wall under it + a lit cap make it read as a raised boss (a part
              sitting in its bored socket), without ever breaking the clean P silhouette -->
      <g class="chip">
        <!-- short iso wall lifting the boss off the pocket floor (down-right, matching the pocket rake) -->
        <use href="#h-counter" transform="translate(1.0 1.1)" fill="#0d9488"/>
        <use href="#h-counter" transform="translate(0.6 0.65)" fill="#14b8a6"/>
        <!-- boss cap (lit, raised teal) -->
        <use href="#h-counter" fill="url(#h-chip)"/>
        <!-- crisp lit edge on the boss's top-left -->
        <use href="#h-counter" fill="none" stroke="#f0fdfa" stroke-width="0.45" stroke-opacity="0.7"/>
        <!-- tiny specular dot on the boss -->
        <ellipse cx="33.0" cy="23.4" rx="1.15" ry="0.75" fill="#f0fdfa" opacity="0.95"/>
        <!-- one warm amber catch on the boss's far corner — the maker's spark -->
        <path d="M39.5 23.6 a3.0 3.0 0 0 1 0.5 3.0" fill="none" stroke="#fbbf24" stroke-width="0.9" stroke-linecap="round" opacity="0.95"/>
      </g>
    </svg>