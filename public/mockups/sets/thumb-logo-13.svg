<svg class="gyr-hero" width="120" height="120" viewBox="0 0 64 64" role="img" aria-label="Partwright — a gyroid surface patch: interlocking teal S and Z strands weaving over and under through saddle points, inside a rounded boundary">
      <defs>
        <!-- round-section strand running NW→SE (the lit, FRONT family). Bright teal crest on the upper edge, deep teal at the lower shaded edge. -->
        <linearGradient id="gh-A" x1="0" y1="0" x2="0.25" y2="1">
          <stop offset="0" stop-color="#ccfbf1"/><stop offset="0.30" stop-color="#5eead4"/><stop offset="0.62" stop-color="#14b8a6"/><stop offset="1" stop-color="#0b6b62"/>
        </linearGradient>
        <!-- round-section strand running NE→SW (the BACK family that dips behind). Emerald, darker overall so it visually recedes. -->
        <linearGradient id="gh-B" x1="0" y1="0" x2="0.2" y2="1">
          <stop offset="0" stop-color="#6ee7b7"/><stop offset="0.4" stop-color="#34d399"/><stop offset="0.7" stop-color="#0f766e"/><stop offset="1" stop-color="#0a3f3a"/>
        </linearGradient>
        <!-- tile field: deep navy so teal/emerald pop, lit from upper-left -->
        <linearGradient id="gh-bg" x1="8" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#13203a"/><stop offset="1" stop-color="#080d18"/>
        </linearGradient>
        <radialGradient id="gh-vig" cx="0.42" cy="0.36" r="0.72">
          <stop offset="0.5" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.5"/>
        </radialGradient>
        <radialGradient id="gh-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <clipPath id="gh-clip"><rect x="5" y="5" width="54" height="54" rx="16"/></clipPath>

        <!-- ==== one gyroid cell as reusable strand families ====
             Coordinates tile on a 24-unit lattice. Each strand is an S/Z bezier
             that rises to a crest and falls to a trough; the families cross only
             at saddle points, and z-order (B behind, A in front) encodes the weave. -->
        <!-- BACK family: Z-strands sweeping NE→SW, three rows. -->
        <g id="gh-Bpath" fill="none" stroke-linecap="round">
          <path d="M58 6 C 47 9, 47 21, 36 24 S 25 39, 14 42"/>
          <path d="M34 6 C 23 9, 23 21, 12 24"/>
          <path d="M58 30 C 47 33, 47 45, 36 48 S 25 63, 14 66"/>
        </g>
        <!-- FRONT family: S-strands sweeping NW→SE, three rows. -->
        <g id="gh-Apath" fill="none" stroke-linecap="round">
          <path d="M6 18 C 17 21, 17 33, 28 36 S 39 51, 50 54"/>
          <path d="M30 6 C 41 9, 41 21, 52 24 S 56 33, 58 33"/>
          <path d="M6 42 C 13 44, 15 50, 20 53"/>
        </g>
      </defs>

      <!-- soft contact shadow grounding the tile -->
      <ellipse cx="32" cy="61" rx="22" ry="2.6" fill="url(#gh-shadow)"/>

      <!-- rounded boundary -->
      <rect x="5" y="5" width="54" height="54" rx="16" fill="url(#gh-bg)"/>

      <g clip-path="url(#gh-clip)" class="gyr-flow">
        <!-- BACK strands: a dark casing first (gives a round, separated edge), then the emerald body, then a faint crest line. -->
        <use href="#gh-Bpath" stroke="#04201d" stroke-width="11" opacity="0.55"/>
        <use href="#gh-Bpath" stroke="url(#gh-B)" stroke-width="8.4"/>
        <use href="#gh-Bpath" stroke="#a7f3d0" stroke-width="1.4" stroke-opacity="0.35"/>

        <!-- contact shadow the FRONT strands cast onto the BACK ones at each crossing -->
        <use href="#gh-Apath" stroke="#03130f" stroke-width="11.5" opacity="0.5" transform="translate(0.9,1.3)"/>

        <!-- FRONT strands: dark casing, lit teal body, bright specular crest along the top edge. -->
        <use href="#gh-Apath" stroke="#062a26" stroke-width="10.6"/>
        <use href="#gh-Apath" stroke="url(#gh-A)" stroke-width="8.6"/>
        <use href="#gh-Apath" stroke="#f0fdfa" stroke-width="1.7" stroke-opacity="0.9" transform="translate(-0.5,-0.7)"/>

        <!-- ambient vignette seats the patch into the boundary -->
        <rect x="5" y="5" width="54" height="54" rx="16" fill="url(#gh-vig)"/>
      </g>

      <!-- crisp inner lip catching a teal rim-light -->
      <rect x="5.7" y="5.7" width="52.6" height="52.6" rx="15.3" fill="none" stroke="#2dd4bf" stroke-width="0.7" stroke-opacity="0.45"/>
    </svg>