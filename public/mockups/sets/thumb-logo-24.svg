<svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — isometric spur gear printing layer by layer">
  <defs>
    <linearGradient id="h-top" x1="12" y1="18" x2="52" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="h-right" x1="32" y1="24" x2="54" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6"/><stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="h-left" x1="10" y1="24" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#0b6b62"/>
    </linearGradient>
    <linearGradient id="h-tooth-top" x1="12" y1="14" x2="52" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ef8e4"/><stop offset="1" stop-color="#38d9c4"/>
    </linearGradient>
    <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000" stop-opacity="0.5"/><stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h-plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- contact shadow -->
  <ellipse cx="32" cy="57.5" rx="24" ry="3.2" fill="url(#h-shadow)"/>

  <!-- build plate -->
  <g class="plate">
    <path d="M54 45.8 L32 57.2 L10 45.8 L32 34.4 Z" fill="#111827"/>
    <path d="M10 45.8 L32 57.2 L32 59 L10 47.6 Z" fill="url(#h-plate)"/>
    <path d="M54 45.8 L32 57.2 L32 59 L54 47.6 Z" fill="#0b1220"/>
    <path d="M54 45.8 L32 57.2 L10 45.8" fill="none" stroke="#14b8a6" stroke-width="0.6" stroke-opacity="0.4" stroke-linejoin="round"/>
  </g>

  <!-- Layer 0 — bottommost -->
  <g class="ly ly0">
    <path d="M10 43.4 L32 54.8 L32 57.2 L10 45.8 Z" fill="url(#h-left)"/>
    <path d="M54 43.4 L32 54.8 L32 57.2 L54 45.8 Z" fill="url(#h-right)"/>
    <path class="seam" d="M10 43.4 L32 54.8 L54 43.4" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
    <path class="flash" d="M10 43.4 L32 54.8 L54 43.4 L32 32 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
  </g>

  <!-- Layer 1 -->
  <g class="ly ly1">
    <path d="M10 41.0 L32 52.4 L32 54.8 L10 43.4 Z" fill="url(#h-left)"/>
    <path d="M54 41.0 L32 52.4 L32 54.8 L54 43.4 Z" fill="url(#h-right)"/>
    <path class="seam" d="M10 41.0 L32 52.4 L54 41.0" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
    <path class="flash" d="M10 41.0 L32 52.4 L54 41.0 L32 29.6 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
  </g>

  <!-- Layer 2 — side teeth appear -->
  <g class="ly ly2">
    <path d="M10 38.6 L32 50.0 L32 52.4 L10 41.0 Z" fill="url(#h-left)"/>
    <path d="M54 38.6 L32 50.0 L32 52.4 L54 41.0 Z" fill="url(#h-right)"/>
    <path d="M14.5 40.4 L18.5 42.8 L18.5 40.4 L14.5 38.0 Z" fill="#0b6b62"/>
    <path d="M21.5 43.8 L25.5 46.2 L25.5 43.8 L21.5 41.4 Z" fill="#0b6b62"/>
    <path d="M49.5 40.4 L45.5 42.8 L45.5 40.4 L49.5 38.0 Z" fill="#0d9488"/>
    <path d="M42.5 43.8 L38.5 46.2 L38.5 43.8 L42.5 41.4 Z" fill="#0d9488"/>
    <path class="seam" d="M10 38.6 L32 50.0 L54 38.6" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
    <path class="flash" d="M10 38.6 L32 50.0 L54 38.6 L32 27.2 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
  </g>

  <!-- Layer 3 -->
  <g class="ly ly3">
    <path d="M10 36.2 L32 47.6 L32 50.0 L10 38.6 Z" fill="url(#h-left)"/>
    <path d="M54 36.2 L32 47.6 L32 50.0 L54 38.6 Z" fill="url(#h-right)"/>
    <path d="M14.5 38.0 L18.5 40.4 L18.5 38.0 L14.5 35.6 Z" fill="#0b6b62"/>
    <path d="M21.5 41.4 L25.5 43.8 L25.5 41.4 L21.5 39.0 Z" fill="#0b6b62"/>
    <path d="M49.5 38.0 L45.5 40.4 L45.5 38.0 L49.5 35.6 Z" fill="#0d9488"/>
    <path d="M42.5 41.4 L38.5 43.8 L38.5 41.4 L42.5 39.0 Z" fill="#0d9488"/>
    <path class="seam" d="M10 36.2 L32 47.6 L54 36.2" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
    <path class="flash" d="M10 36.2 L32 47.6 L54 36.2 L32 24.8 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
  </g>

  <!-- Layer 4 -->
  <g class="ly ly4">
    <path d="M10 33.8 L32 45.2 L32 47.6 L10 36.2 Z" fill="url(#h-left)"/>
    <path d="M54 33.8 L32 45.2 L32 47.6 L54 36.2 Z" fill="url(#h-right)"/>
    <path d="M14.5 35.6 L18.5 38.0 L18.5 35.6 L14.5 33.2 Z" fill="#0b6b62"/>
    <path d="M21.5 39.0 L25.5 41.4 L25.5 39.0 L21.5 36.6 Z" fill="#0b6b62"/>
    <path d="M49.5 35.6 L45.5 38.0 L45.5 35.6 L49.5 33.2 Z" fill="#0d9488"/>
    <path d="M42.5 39.0 L38.5 41.4 L38.5 39.0 L42.5 36.6 Z" fill="#0d9488"/>
    <path class="seam" d="M10 33.8 L32 45.2 L54 33.8" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
    <path class="flash" d="M10 33.8 L32 45.2 L54 33.8 L32 22.4 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
  </g>

  <!-- Layer 5 -->
  <g class="ly ly5">
    <path d="M10 31.4 L32 42.8 L32 45.2 L10 33.8 Z" fill="url(#h-left)"/>
    <path d="M54 31.4 L32 42.8 L32 45.2 L54 33.8 Z" fill="url(#h-right)"/>
    <path d="M14.5 33.2 L18.5 35.6 L18.5 33.2 L14.5 30.8 Z" fill="#0b6b62"/>
    <path d="M21.5 36.6 L25.5 39.0 L25.5 36.6 L21.5 34.2 Z" fill="#0b6b62"/>
    <path d="M49.5 33.2 L45.5 35.6 L45.5 33.2 L49.5 30.8 Z" fill="#0d9488"/>
    <path d="M42.5 36.6 L38.5 39.0 L38.5 36.6 L42.5 34.2 Z" fill="#0d9488"/>
    <path class="seam" d="M10 31.4 L32 42.8 L54 31.4" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
    <path class="flash" d="M10 31.4 L32 42.8 L54 31.4 L32 20.0 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
  </g>

  <!-- Layer 6 -->
  <g class="ly ly6">
    <path d="M10 29.0 L32 40.4 L32 42.8 L10 31.4 Z" fill="url(#h-left)"/>
    <path d="M54 29.0 L32 40.4 L32 42.8 L54 31.4 Z" fill="url(#h-right)"/>
    <path d="M14.5 30.8 L18.5 33.2 L18.5 30.8 L14.5 28.4 Z" fill="#0b6b62"/>
    <path d="M21.5 34.2 L25.5 36.6 L25.5 34.2 L21.5 31.8 Z" fill="#0b6b62"/>
    <path d="M49.5 30.8 L45.5 33.2 L45.5 30.8 L49.5 28.4 Z" fill="#0d9488"/>
    <path d="M42.5 34.2 L38.5 36.6 L38.5 34.2 L42.5 31.8 Z" fill="#0d9488"/>
    <path class="seam" d="M10 29.0 L32 40.4 L54 29.0" fill="none" stroke="#0b3b38" stroke-width="0.5" stroke-opacity="0.35"/>
    <path class="flash" d="M10 29.0 L32 40.4 L54 29.0 L32 17.6 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
  </g>

  <!-- Layer 7 — topmost: full top face + teeth + bore -->
  <g class="ly ly7">
    <path d="M10 26.6 L32 38.0 L32 40.4 L10 29.0 Z" fill="url(#h-left)"/>
    <path d="M54 26.6 L32 38.0 L32 40.4 L54 29.0 Z" fill="url(#h-right)"/>
    <path d="M14.5 28.4 L18.5 30.8 L18.5 28.4 L14.5 26.0 Z" fill="#0b6b62"/>
    <path d="M21.5 31.8 L25.5 34.2 L25.5 31.8 L21.5 29.4 Z" fill="#0b6b62"/>
    <path d="M49.5 28.4 L45.5 30.8 L45.5 28.4 L49.5 26.0 Z" fill="#0d9488"/>
    <path d="M42.5 31.8 L38.5 34.2 L38.5 31.8 L42.5 29.4 Z" fill="#0d9488"/>
    <!-- top disc face -->
    <path d="M10 26.6 L32 38.0 L54 26.6 L32 15.2 Z" fill="url(#h-top)"/>
    <!-- top teeth lozenges -->
    <path d="M38 35.5 L44 32.5 L47 34.0 L41 37.0 Z" fill="url(#h-tooth-top)"/>
    <path d="M44 32.5 L50 29.5 L53 31.0 L47 34.0 Z" fill="url(#h-tooth-top)"/>
    <path d="M26 35.5 L20 32.5 L17 34.0 L23 37.0 Z" fill="url(#h-tooth-top)"/>
    <path d="M20 32.5 L14 29.5 L11 31.0 L17 34.0 Z" fill="url(#h-tooth-top)"/>
    <path d="M44 19.5 L50 16.5 L48 15.2 L42 18.2 Z" fill="url(#h-tooth-top)"/>
    <path d="M20 19.5 L14 16.5 L16 15.2 L22 18.2 Z" fill="url(#h-tooth-top)"/>
    <!-- lit front edge -->
    <path d="M10 26.6 L32 38.0 L54 26.6" fill="none" stroke="#ccfbf1" stroke-width="0.7" stroke-opacity="0.8" stroke-linejoin="round"/>
    <!-- center bore -->
    <ellipse cx="32" cy="26.6" rx="4.5" ry="2.2" fill="#062520"/>
    <ellipse cx="32" cy="26.0" rx="3.8" ry="1.8" fill="#030f0e"/>
    <!-- amber catch-light -->
    <path d="M44 32.5 L50 29.5" fill="none" stroke="#fbbf24" stroke-width="1.1" stroke-linecap="round" opacity="0.92"/>
    <path class="flash" d="M10 26.6 L32 38.0 L54 26.6 L32 15.2 Z" fill="none" stroke="#ccfbf1" stroke-width="1.1" stroke-opacity="0"/>
  </g>
</svg>
