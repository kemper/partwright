<svg width="120" height="120" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Partwright mark">
      <defs>
        <linearGradient id="h-solid" x1="32" y1="20" x2="52" y2="50" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#2dd4bf"/>
          <stop offset="0.55" stop-color="#14b8a6"/>
          <stop offset="1" stop-color="#6366f1"/>
        </linearGradient>
        <linearGradient id="h-top" x1="32" y1="8" x2="52" y2="20" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/>
          <stop offset="1" stop-color="#2dd4bf"/>
        </linearGradient>
      </defs>
      <!-- SOLID half: right side of cube (top-right facet + right face) -->
      <path d="M32 8 L52 20 L32 32 Z" fill="url(#h-top)"/>
      <path d="M32 32 L52 20 L52 44 L32 56 Z" fill="url(#h-solid)"/>
      <!-- WIREFRAME half: left side, thin edges only -->
      <g stroke="#5eead4" stroke-width="1" stroke-linejoin="round" stroke-linecap="round" fill="none">
        <path d="M32 8 L12 20 L32 32"/>
        <path d="M12 20 L12 44 L32 56"/>
        <path d="M32 32 L32 56" stroke="#2dd4bf"/>
      </g>
      <!-- split seam, brighter -->
      <path d="M32 8 L32 32" stroke="#5eead4" stroke-width="1.25" stroke-linecap="round"/>
      <!-- vertex dots on the wireframe half -->
      <g fill="#5eead4">
        <circle cx="32" cy="8" r="2.1"/>
        <circle cx="12" cy="20" r="2.1"/>
        <circle cx="12" cy="44" r="2.1"/>
        <circle cx="32" cy="56" r="2.1"/>
        <circle cx="32" cy="32" r="1.9" fill="#2dd4bf"/>
      </g>
    </svg>