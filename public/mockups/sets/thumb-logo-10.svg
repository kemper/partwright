<svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — machined negative-space P">
      <defs>
        <!-- block face: top-down key light, teal at top → deep navy at the bottom -->
        <linearGradient id="h-face" x1="20" y1="7" x2="44" y2="56" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#2dd4bf"/>
          <stop offset="0.42" stop-color="#14b8a6"/>
          <stop offset="0.78" stop-color="#0f766e"/>
          <stop offset="1" stop-color="#0f172a"/>
        </linearGradient>
        <!-- glossy sheen sweeping the upper-left of the face -->
        <linearGradient id="h-gloss" x1="10" y1="8" x2="40" y2="42" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4" stop-opacity="0.55"/>
          <stop offset="0.5" stop-color="#5eead4" stop-opacity="0"/>
        </linearGradient>
        <!-- pocket floor: darkest, the bottom of the bored cut -->
        <linearGradient id="h-floor" x1="22" y1="14" x2="40" y2="50" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0b3b38"/>
          <stop offset="1" stop-color="#05201d"/>
        </linearGradient>
        <!-- raised boss (P counter) — lit teal cap -->
        <linearGradient id="h-boss" x1="30" y1="20" x2="38" y2="30" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5eead4"/>
          <stop offset="1" stop-color="#14b8a6"/>
        </linearGradient>
        <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#000000" stop-opacity="0.5"/>
          <stop offset="1" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        <!-- the negative-space P: solid stem + bowl, counter punched out -->
        <path id="h-P" fill-rule="evenodd" d="
          M24 16 L36.5 16
          C43 16 46.5 20 46.5 25.5
          C46.5 31 43 35 36.5 35
          L30 35 L30 48 L24 48 Z
          M30 22 L30 29 L35.5 29
          C38.4 29 39.8 27.6 39.8 25.5
          C39.8 23.4 38.4 22 35.5 22 Z"/>
        <clipPath id="h-clip"><rect x="9" y="8" width="46" height="46" rx="10"/></clipPath>
      </defs>

      <!-- contact shadow grounding the block -->
      <ellipse cx="32.5" cy="58.4" rx="22" ry="3.4" fill="url(#h-shadow)"/>

      <!-- the solid teal block, gradient-lit -->
      <rect x="9" y="8" width="46" height="46" rx="10" fill="url(#h-face)"/>

      <!-- pocket: dark wall occlusion offset down/right, floor on top, lit lip catching the key light top-left -->
      <g>
        <!-- wall occlusion halo (soft dark) behind the cut -->
        <use href="#h-P" fill="#04201d" transform="translate(1.0 1.2)"/>
        <!-- pocket floor -->
        <use href="#h-P" fill="url(#h-floor)"/>
        <!-- bright machined lip on the top-left walls (catches the key light) -->
        <use href="#h-P" fill="none" stroke="#5eead4" stroke-width="0.7" stroke-opacity="0.7" transform="translate(-0.35 -0.45)"/>
      </g>

      <!-- raised boss occupying the P counter, with its own little drop shadow -->
      <g>
        <path d="M30 22 L30 29 L35.5 29 C38.4 29 39.8 27.6 39.8 25.5 C39.8 23.4 38.4 22 35.5 22 Z" fill="#04201d" transform="translate(0.6 0.75)"/>
        <path d="M30 22 L30 29 L35.5 29 C38.4 29 39.8 27.6 39.8 25.5 C39.8 23.4 38.4 22 35.5 22 Z" fill="url(#h-boss)"/>
        <!-- tiny specular dot on the boss cap -->
        <ellipse cx="32.4" cy="24.2" rx="1.5" ry="1.0" fill="#ccfbf1" opacity="0.7"/>
      </g>

      <!-- gloss + edge highlights, clipped to the rounded block so nothing spills past the corners -->
      <g clip-path="url(#h-clip)">
        <!-- glossy sheen overlay on the block -->
        <rect x="9" y="8" width="46" height="46" rx="10" fill="url(#h-gloss)"/>
        <!-- crisp specular highlight catching the top edge -->
        <path d="M16 8.8 L48 8.8" stroke="#ccfbf1" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
        <!-- single warm amber catch on the upper-right corner — the maker's spark -->
        <path d="M49.5 8.9 C52.4 9.6 54 11.4 54.4 14.4" fill="none" stroke="#fbbf24" stroke-width="1.3" stroke-linecap="round" opacity="0.92"/>
      </g>
    </svg>