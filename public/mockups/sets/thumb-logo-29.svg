<svg width="140" height="140" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — machined negative-space P in a disc">
  <defs>
    <!-- disc top face: top-down key light, teal at top → deep navy near rim -->
    <radialGradient id="h-face" cx="0.42" cy="0.35" r="0.68" gradientUnits="objectBoundingBox">
      <stop offset="0"    stop-color="#2dd4bf"/>
      <stop offset="0.38" stop-color="#14b8a6"/>
      <stop offset="0.72" stop-color="#0f766e"/>
      <stop offset="1"    stop-color="#0f172a"/>
    </radialGradient>
    <!-- glossy sheen on upper-left of face -->
    <radialGradient id="h-gloss" cx="0.28" cy="0.22" r="0.55" gradientUnits="objectBoundingBox">
      <stop offset="0"   stop-color="#5eead4" stop-opacity="0.52"/>
      <stop offset="0.6" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <!-- disc side wall (cylindrical belt visible below the top ellipse) -->
    <linearGradient id="h-wall" x1="10" y1="26" x2="54" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#0a3d38"/>
      <stop offset="0.5" stop-color="#072e2b"/>
      <stop offset="1"   stop-color="#04201d"/>
    </linearGradient>
    <!-- pocket floor: deep bored cavity -->
    <radialGradient id="h-floor" cx="0.44" cy="0.4" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#0b3b38"/>
      <stop offset="1" stop-color="#05201d"/>
    </radialGradient>
    <!-- raised boss (P counter) cap -->
    <linearGradient id="h-boss" x1="27" y1="22" x2="37" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <!-- contact shadow beneath puck -->
    <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- clip to top ellipse for highlights that must not spill -->
    <clipPath id="h-ellclip">
      <ellipse cx="32" cy="26" rx="22" ry="10"/>
    </clipPath>
    <!-- P shape sized and centered for the elliptical face -->
    <path id="h-P" fill-rule="evenodd" d="
      M20 17 L31.5 17
      C37.4 17 40.5 20.4 40.5 25
      C40.5 29.6 37.4 33 31.5 33
      L25.8 33 L25.8 37 L20 37 Z
      M25.8 21.5 L25.8 28.5 L31 28.5
      C33.6 28.5 34.8 27.2 34.8 25
      C34.8 22.8 33.6 21.5 31 21.5 Z"/>
  </defs>

  <!-- contact shadow grounding the puck -->
  <ellipse cx="32" cy="59" rx="20" ry="3.2" fill="url(#h-shadow)"/>

  <!-- side wall: visible crescent band below the top ellipse -->
  <path d="M10 26 Q10 40 32 40 Q54 40 54 26" fill="url(#h-wall)"/>

  <!-- top disc face (ellipse) -->
  <ellipse cx="32" cy="26" rx="22" ry="10" fill="url(#h-face)"/>

  <!-- pocket cut: wall occlusion offset, floor, machined lip -->
  <use href="#h-P" fill="#04201d" transform="translate(0.9 1.0)"/>
  <use href="#h-P" fill="url(#h-floor)"/>
  <!-- bright machined lip catching key light (slightly offset top-left) -->
  <use href="#h-P" fill="none" stroke="#5eead4" stroke-width="0.65" stroke-opacity="0.7" transform="translate(-0.3 -0.4)"/>

  <!-- raised boss occupying the P counter -->
  <path d="M25.8 21.5 L25.8 28.5 L31 28.5 C33.6 28.5 34.8 27.2 34.8 25 C34.8 22.8 33.6 21.5 31 21.5 Z"
        fill="#04201d" transform="translate(0.55 0.7)"/>
  <path d="M25.8 21.5 L25.8 28.5 L31 28.5 C33.6 28.5 34.8 27.2 34.8 25 C34.8 22.8 33.6 21.5 31 21.5 Z"
        fill="url(#h-boss)"/>
  <!-- tiny specular dot on boss cap -->
  <ellipse cx="27.8" cy="23.6" rx="1.3" ry="0.9" fill="#ccfbf1" opacity="0.72"/>

  <!-- gloss, edge highlights — clipped to top ellipse -->
  <g clip-path="url(#h-ellclip)">
    <ellipse cx="32" cy="26" rx="22" ry="10" fill="url(#h-gloss)"/>
    <!-- crisp top-edge specular along the near rim of the disc -->
    <path d="M16 18 Q32 15 48 18" fill="none" stroke="#ccfbf1" stroke-width="1.0" stroke-linecap="round" opacity="0.82"/>
    <!-- warm amber catch on right edge — the maker's spark -->
    <path d="M51.5 22 C53.2 24.2 53.4 26.6 52 28.8" fill="none" stroke="#fbbf24" stroke-width="1.25" stroke-linecap="round" opacity="0.90"/>
  </g>

  <!-- subtle bright rim highlight along the top of the side wall -->
  <path d="M10.4 26.6 Q10.4 38.5 32 38.5 Q53.6 38.5 53.6 26.6" fill="none" stroke="#14b8a6" stroke-width="0.5" stroke-opacity="0.35"/>
</svg>
