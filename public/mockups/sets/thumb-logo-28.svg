<svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Partwright — chamfered negative-space P">
  <defs>
    <!-- block face: top-down key light, teal at top → deep navy at bottom -->
    <linearGradient id="h-face" x1="20" y1="8" x2="44" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.40" stop-color="#14b8a6"/>
      <stop offset="0.76" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <!-- chamfer face: angled bevel ring — lighter/warmer than main face, catches top light -->
    <linearGradient id="h-chamfer" x1="13" y1="8" x2="51" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4" stop-opacity="1"/>
      <stop offset="0.35" stop-color="#2dd4bf" stop-opacity="1"/>
      <stop offset="0.65" stop-color="#0d9488" stop-opacity="1"/>
      <stop offset="1" stop-color="#0f4a44" stop-opacity="1"/>
    </linearGradient>
    <!-- glossy sheen sweeping the upper-left of the inset face -->
    <linearGradient id="h-gloss" x1="13" y1="12" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.50"/>
      <stop offset="0.55" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>
    <!-- pocket floor: darkest, bottom of the bored cut — more dramatic contrast -->
    <linearGradient id="h-floor" x1="22" y1="15" x2="40" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#072825"/>
      <stop offset="1" stop-color="#031510"/>
    </linearGradient>
    <!-- raised boss (P counter) — lit teal cap -->
    <linearGradient id="h-boss" x1="30" y1="21" x2="38" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <!-- ambient shadow under block -->
    <radialGradient id="h-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- the negative-space P: taller + more condensed bowl -->
    <path id="h-P" fill-rule="evenodd" d="
      M23 14 L37 14
      C44 14 47.5 18.2 47.5 24
      C47.5 29.8 44 34 37 34
      L30 34 L30 50 L23 50 Z
      M30 20.5 L30 27.5 L36.2 27.5
      C39.2 27.5 40.7 26.1 40.7 24
      C40.7 21.9 39.2 20.5 36.2 20.5 Z"/>
    <!-- clip to the inset top face -->
    <clipPath id="h-faceClip"><rect x="13" y="12" width="38" height="38" rx="2"/></clipPath>
    <!-- clip to the full outer block for edge highlights -->
    <clipPath id="h-outerClip"><rect x="9" y="8" width="46" height="46" rx="4"/></clipPath>
  </defs>

  <!-- contact shadow grounding the block -->
  <ellipse cx="32.5" cy="58.4" rx="22" ry="3.4" fill="url(#h-shadow)"/>

  <!-- LAYER 1: full-size outer block body — chamfer gradient fills the perimeter ring -->
  <rect x="9" y="8" width="46" height="46" rx="4" fill="url(#h-chamfer)"/>

  <!-- LAYER 2: inset top face — the milled top surface, slightly recessed -->
  <rect x="13" y="12" width="38" height="38" rx="2" fill="url(#h-face)"/>

  <!-- LAYER 3: pocket — dark wall occlusion offset down/right -->
  <g>
    <!-- wall occlusion halo (deeper shadow — more dramatic than logo-10) -->
    <use href="#h-P" fill="#031510" transform="translate(1.2 1.4)"/>
    <!-- pocket floor -->
    <use href="#h-P" fill="url(#h-floor)"/>
    <!-- bright machined lip on the top-left walls (catches key light) -->
    <use href="#h-P" fill="none" stroke="#4dd9c4" stroke-width="0.75" stroke-opacity="0.65" transform="translate(-0.4 -0.5)"/>
  </g>

  <!-- LAYER 4: raised boss in the P counter, with its own drop shadow -->
  <g>
    <path d="M30 20.5 L30 27.5 L36.2 27.5 C39.2 27.5 40.7 26.1 40.7 24 C40.7 21.9 39.2 20.5 36.2 20.5 Z" fill="#031510" transform="translate(0.65 0.8)"/>
    <path d="M30 20.5 L30 27.5 L36.2 27.5 C39.2 27.5 40.7 26.1 40.7 24 C40.7 21.9 39.2 20.5 36.2 20.5 Z" fill="url(#h-boss)"/>
    <!-- tiny specular dot on the boss cap -->
    <ellipse cx="32.2" cy="23.0" rx="1.5" ry="0.95" fill="#ccfbf1" opacity="0.72"/>
  </g>

  <!-- LAYER 5: gloss + edge highlights on the inset face, clipped to face boundary -->
  <g clip-path="url(#h-faceClip)">
    <rect x="13" y="12" width="38" height="38" rx="2" fill="url(#h-gloss)"/>
    <!-- crisp specular highlight on the inset top edge of the face -->
    <path d="M16 12.7 L48 12.7" stroke="#ccfbf1" stroke-width="1.0" stroke-linecap="round" opacity="0.80"/>
  </g>

  <!-- LAYER 6: chamfer edge highlights clipped to outer block -->
  <g clip-path="url(#h-outerClip)">
    <!-- bright inner bevel edge catching key light along top -->
    <path d="M14 12 L50 12" stroke="#9af0e0" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
    <!-- outer top edge specular — the very rim of the billet -->
    <path d="M14 8.7 L50 8.7" stroke="#ccfbf1" stroke-width="0.7" stroke-linecap="round" opacity="0.55"/>
    <!-- warm amber catch-light on the upper-right corner of the chamfer -->
    <path d="M51.5 9.2 C53.8 10.0 55.0 12.0 55.2 14.6" fill="none" stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round" opacity="0.90"/>
    <!-- left chamfer edge — slightly lighter than right (faces the key light) -->
    <path d="M13 12 L9.5 8.5" stroke="#5eead4" stroke-width="0.6" stroke-opacity="0.50"/>
  </g>
</svg>
